apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gke-k8s-alerts
  namespace: monitoring
spec:
  groups:
  - name: k8s.rules
    rules:
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Pod restarting frequently"
        description: "Pod has frequent restarts in last 10 minutes."

    - alert: NodeNotReady
      expr: kube_node_status_condition{condition="Ready",status="true"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node NotReady"
        description: "One or more nodes are NotReady for > 5 minutes."
