apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: srini23-blackbox-alerts
  namespace: monitoring
spec:
  groups:
  - name: srini23.rules
    rules:
    - alert: Srini23SiteDown
      expr: probe_success{job="blackbox_https_srini23"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "srini23.com is DOWN"
        description: "Blackbox probe to https://srini23.com has been failing for 2 minutes."

    - alert: Srini23HighLatency
      expr: probe_duration_seconds{job="blackbox_https_srini23"} > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "srini23.com latency is high"
        description: "Probe latency > 1s for 5 minutes (current={{ $value }}s)."

    - alert: Srini23Http5xx
      expr: probe_http_status_code{job="blackbox_https_srini23"} >= 500
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "srini23.com is returning 5xx"
        description: "HTTP status code is {{ $value }} for 2 minutes."

    - alert: Srini23SSLCertExpiringSoon
      expr: (probe_ssl_earliest_cert_expiry{job="blackbox_https_srini23"} - time()) < 86400 * 7
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "srini23.com SSL certificate expiring soon"
        description: "SSL certificate expires in less than 7 days."
