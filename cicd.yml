name: CI-CD-NGINX-GKE

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: 2823/nginx-app

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Generate tag
      id: tag
      run: |
        TAG=v$(date +%s)
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Login to DockerHub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build image
      run: |
        docker build -t $IMAGE_NAME:${{ steps.tag.outputs.tag }} .

    - name: Push image
      run: |
        docker push $IMAGE_NAME:${{ steps.tag.outputs.tag }}

  deploy-gke:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
          --zone ${{ secrets.GKE_ZONE }} \
          --project ${{ secrets.GCP_PROJECT_ID }}

    # ✅ Deploy to GREEN (safe rollout)
    - name: Deploy to GREEN
      run: |
        kubectl set image deployment/nginx-green \
          nginx=${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }} \
          -n nginx-bg

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/nginx-green -n nginx-bg

    # ✅ Health check (basic)
    - name: Verify pods
      run: |
        kubectl get pods -n nginx-bg

    # ✅ SWITCH TRAFFIC (Blue → Green)
    - name: Switch traffic to GREEN
      run: |
        kubectl patch svc nginx-svc -n nginx-bg \
          -p '{"spec":{"selector":{"app":"nginx-app","color":"green"}}}'
